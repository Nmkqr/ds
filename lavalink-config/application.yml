server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "Nmk057007"
    sources:
      youtube: false # مهم جداً لتعطيل النظام القديم
      soundcloud: true
      http: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10

# تأكد أن كلمة plugins تحت محاذاة كلمة lavalink تماماً
plugins:
  - dependency: "dev.lavalink.youtube:youtube-plugin:1.12.0"
    snapshot: false

pluginsConfig:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - ANDROID
      - TVHTML5EMBEDDED

logging:
  level:
    root: INFO
    lavalink: INFO
