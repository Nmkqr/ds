services:
  lavalink:
    image: 'ghcr.io/lavalink-devs/lavalink:4'
    container_name: lavalink
    restart: unless-stopped
    volumes:
      # تأكد أن الملف موجود في المستودع بنفس الاسم
      - './application.yml:/opt/Lavalink/application.yml'
    networks:
      - music-network

  music-bot:
    # إذا كان ملف Dockerfile في المجلد الرئيسي، استخدم . فقط
    build: .
    container_name: music-bot
    restart: unless-stopped
    environment:
      - 'DISCORD_TOKEN=${DISCORD_TOKEN}'
      - 'CLIENT_ID=${CLIENT_ID}'
      - 'LAVALINK_PASSWORD=${LAVALINK_PASSWORD}'
      - LAVALINK_HOST=lavalink
      - LAVALINK_PORT=2333
    depends_on:
      - lavalink
    networks:
      - music-network

networks:
  music-network:
    driver: bridge
    attachable: true
