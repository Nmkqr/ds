services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: always
    environment:
      - _JAVA_OPTIONS=-Xmx512M
    volumes:
      # تأكد أن ملف application.yml موجود في المجلد الرئيسي بجانب هذا الملف
      - ./application.yml:/opt/Lavalink/application.yml
    networks:
      - bot-network
    ports:
      - "2333:2333"

  music-bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: music-bot
    restart: always
    depends_on:
      - lavalink
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - LAVALINK_HOST=lavalink  # لاحظ هنا استخدمنا الاسم وليس IP
      - LAVALINK_PORT=2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD}
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
